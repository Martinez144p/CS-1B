<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple carousel · example</title>



    <style>


        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(zenitsu.webp);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            background-size: cover;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: lightblue;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 25px 50px #5acbf8;
            text-align: center;
        }

        h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #7a62b5;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 15px 25px #9d87cf;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note {
            margin-top: 1.8rem;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
        }
        
    </style>
</head>

<body>
    <div class="card">
        <h2><b>SERVANT HEROES</b></h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item" id="slide1">
                <img src = "saber.webp">
                <a href="#slide1"></a>



            </div>


            <div class="carousel-item" id="slide2">

                <a href="#slide2"> </a>



            </div>


            <div class="carousel-item" id="slide3">

                 <a href="#slide3" ></a>



            </div>


            <div class="carousel-item" id="slide4">
                <img src = "honkaiM1.png">
                <a href =  "#slide4" ></a>
               



            </div>


            <div class="carousel-item" id="slide5">
                <img src = "honkaiM2.webp">
                <a href="#slide5"></a>



            </div>


            <div class="carousel-item" id="slide6">
                <img src = "honkaiM3.png">
                



            </div>

            
            


        </div>

        <br>
        <br>
        <br>

        <a href="#slide1"
        style=" padding: 10px; border: 2px solid lightblue; background-color: lightblue; color: black;font-style: oblique; box-shadow: 0 5px 15px #f8f54f;">
        <strong>slide 1</strong></a>


        <a href="#slide2" 
        
        style=" padding: 10px; border: 2px solid lightblue; background-color: lightblue; color: black; font-style: oblique ; box-shadow: 0 5px 15px #f8f54f;">
        <strong>slide 2</strong></a>


        <a href="#slide3"
        style="padding: 10px; border: 2px solid lightblue; background-color: lightblue; color: black; font-style: oblique; box-shadow: 0 5px 15px #f8f54f;">
        <strong>slide 3</strong></a>


        <a href="#slide4"
        style=" padding: 10px; border: 2px solid lightblue; background-color: lightblue; color: black; font-style: oblique; box-shadow: 0 5px 15px #f8f54f;">
        <strong>slide 4</strong></a>


        <a href="#slide5"
        style=" padding: 10px; border: 2px solid lightblue; background-color:lightblue; color: black;font-style: oblique; box-shadow: 0 5px 15px #f8f54f;">
        <strong>slide 5</strong></a>

        <strong>slide 6</strong></a>



        

       
    </div>
</body>
</html>
